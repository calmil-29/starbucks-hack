<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="card-hero-section">
  
  <div class="card-flip-container" id="cardFlip">
    <div class="card-flip-inner">
      
      <!-- カード表面 -->
      <div class="card-front">
        <div class="card-main-visual">
          <div class="qr-tap-area" onclick="openQrModal()">
            <div class="card-qr-box">
              <img src="../images/QRコード.png" alt="QR" class="qr-img">
            </div><!-- .card-qr-box -->
          </div><!-- .qr-tap-area -->

          <div class="card-info-side">
            <img src="../images/starbucks-logo.png" alt="Logo" class="mini-logo">
            <div class="balance-display">
              <p class="card-label">Starbucks Card</p>
              <p class="card-price"><span class="unit">¥ </span>00,000</p><!-- .card-price -->
            </div><!-- .balance-display -->
            
            <!-- buttonタグのみにし、aタグでの囲いを削除 -->
            <button class="btn-etiket-trigger" onclick="flipCard(event)">
              <div class="count-box">
                <span class="count">3</span>
              </div><!-- .count-box --> 
              <span class="eticket-label">eTicket</span>
              <span class="eticket-badge"></span>
            </button><!-- .btn-etiket-trigger -->
          </div><!-- .card-info-side -->
        </div><!-- .card-main-visual -->
        
        <div class="star-progress-overlay">
          <div class="rewards-label">
            <p>STARBUCKS® REWARDS</p>
          </div><!-- .rewards-label -->  

          <div class="current-stars-group">
            <div class="current-reward">
              <span class="big-number">160</span>.5 <img src="../images/Star-icon.svg" alt="★">
            </div><!-- .current-reward -->
            <p class="member-status">Green会員</p>
          </div><!-- .current-stars-group -->

          <div class="progress-bar-wrapper">
            <div class="progress-bar-track">
              <div id="js-progressbar" class="progress-bar-fill"></div><!-- #js-progressbar -->
              <div class="track-dots">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
              </div><!-- .track-dots -->
            </div><!-- .progress-bar-track -->  
            <div class="progress-steps">
              <span>25</span><span>90</span><span>130</span><span>190</span><span>400</span>
            </div><!-- .progress-steps -->
          </div><!-- .progress-bar-wrapper -->
        </div><!-- .star-progress-overlay -->
      </div><!-- .card-front -->
      
      <!-- カード裏面 -->
      <div class="card-back">
        <div class="ticket-header">
          <span class="ticket-title">Star Ticket</span>
          <button class="btn-back-to-front" onclick="flipCard(event)">BACK</button>
        </div><!-- .ticket-header -->
      </div><!-- .card-back -->

    </div><!-- .card-flip-inner -->
  </div><!-- #cardFlip -->

  <!-- 下部アクションボタン：aタグをボタン風に装飾する前提で整理 -->
  <div class="card-action-list">
    <a href="#" class="btn-charge" aria-label="入金">入金</a><!-- .btn-charge --> 
    
    <div class="btn-action-group">
      <a href="#" class="btn-reward" aria-label="スターリワードに交換する">スターリワードに交換</a><!-- .btn-reward --> 
      <a href="#" class="btn-reward-more" aria-label="スターリワードをもっと見る">もっと見る</a><!-- .btn-reward-more -->
    </div><!-- .btn-action-group -->
  </div><!-- .card-action-list -->  
  
  <div id="qrModal" class="qr-modal">
  </div><!-- #qrModal -->

</section><!-- .card-hero-section -->


</body>
</html>
