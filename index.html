<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

 <section class="card-hero-section">
  <div class="card-flip-container" id="cardFlip">
    <div class="card-flip-inner">
      
      <div class="card-front">
        <div class="card-main-visual">
          <div class="qr-tap-area" onclick="openQrModal()">
            <div class="card-qr-box">
              <img src="../images/QRコード.png" alt="QR" class="qr-img">
            </div>
          </div>
          <div class="card-info-side">
            <img src="../images/starbucks-logo.png" alt="Logo" class="mini-logo">
            <div class="balance-display">
              <p class="label">Starbucks Card</p>
              <p class="price"><span class="unit">¥</span>00,000</p>
            </div>
            <button class="btn-etiket-trigger" onclick="flipCard(event)">
              <span class="count">3</span> eTicket
            </button>
          </div>
        </div>

        <div class="star-progress-overlay">
          <div class="rewards-text-group">
            <p class="rewards-label">STARBUCKS® REWARDS</p>
            <div class="current-stars">160.5 <img src="../images/Star-icon.svg" alt="★"></div>
          </div>
          <p class="progress-title">STARS TO E-TICKET PROGRESS</p>
          <div class="progress-bar-wrapper">
            <div class="progress-bar-track"><div class="progress-bar-fill"></div></div>
            <div class="progress-steps">
              <span>25</span><span>90</span><span>130</span><span>190</span><span class="gold-text">400</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card-back">
        <div class="ticket-header">
           <span class="ticket-title">Star Ticket</span>
           <button class="btn-back-to-front" onclick="flipCard(event)">BACK</button>
        </div>
        </div>

    </div>
  </div>

  <div class="card-action-list">
    <button class="btn-charge">入金</button>
    <button class="btn-reward">スターリワード交換</button>
  </div>

  <div id="qrModal" class="qr-modal">
    <div class="qr-modal-content">
      <div class="modal-handle"></div> <div class="modal-qr-big">
        <img src="../images/QRコード.png" alt="Big QR">
        <p class="code-number">0000 0000 0000 0000</p>
      </div>
      <ul class="modal-menu">
        <li>カード管理 (入金・切り替え)</li>
        <li>eGift <span>&gt;</span></li>
        <li onclick="closeQrModal()">閉じる</li>
      </ul>
    </div>
  </div>
</section>




</body>
</html>
