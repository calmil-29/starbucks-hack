<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <!-- ①カード表面(メインカード) -->
  <div class="card-flip-container" id="cardFlip">
    <div class="card-flip-inner">
      
      <div class="card-front">
        <div class="card-main-visual">
          <div class="qr-tap-area" onclick="openQrModal()">
            <div class="card-qr-box">
              <img src="../images/QRコード.png" alt="QR" class="qr-main">
            </div>
          </div>

          <div class="card-info-side">
           ...
            </div>
            
            <button class="btn-etiket-trigger" onclick="flipCard(event)">
              <div class="count-box">3</div>
              <span class="eticket-label">eTicket</span>
              <span class="eticket-badge"></span>
            </button>
          </div><!-- .card-info-side -->
        </div><!-- .card-main-visual -->
      ...
      </div><!-- .card-front -->
      
      
      <!-- ②カード裏面(eTicket / eGift eTicket) -->
      <div class="card-back">
       ...

        <button class="btn-back-to-front" onclick="flipCard(event)">BACK</button>

      </div><!-- .card-back -->

    </div><!-- .card-flip-inner -->
  </div><!-- .card-flip-container #cardFlip -->

</body>
</html>
