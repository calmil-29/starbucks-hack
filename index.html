<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="card-hero-section">
  <div class="card-flip-inner">
    
    <div class="card-front">
      
      <div class="card-main-visual">
        <div class="qr-tap-area">
          <div class="card-qr-box">
            <img src="../images/QRコード.png" alt="QR" class="qr-img">
          </div>
        </div>

        <div class="card-info-side">
          <img src="../images/starbucks-logo.png" alt="Logo" class="mini-logo">
          <div class="balance-display">
            <p class="label">Starbucks Card</p>
            <p class="price"><span class="unit">¥</span>00,000</p>
          </div>
          <button class="btn-etiket-trigger">
            <span class="count">3</span> eTicket
          </button>
        </div>
      </div>

      <div class="star-progress-area">
        <p class="progress-title">STARS TO E-TICKET PROGRESS</p>
        <div class="progress-bar-container">
          <div class="bar-line"></div> <div class="points">
            <span>25</span><span>90</span><span>130</span><span>190</span><span class="gold">400</span>
          </div>
        </div>
      </div>

      <div class="card-actions">
        <button class="btn-charge">入金</button>
        <button class="btn-reward">スターリワードに交換</button>
      </div>

    </div> </div> </section>




 



</body>
</html>
