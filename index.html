<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    
    <!-- B. 各種設定メニュー一覧 -->
        <div class="deposit-menu-list">
          
          <!-- 1. カード選択 -->
          <div class="deposit-menu-item">
            <div class="menu-clickable-area" onclick="toggleDepositWindow('card', event)">
              <span class="menu-label">カード選択</span>
              <div class="menu-value-box">
                <span class="current-value">Starbucks Card ¥00,000</span>
                <span class="arrow-balance"></span> 
              </div>
            </div>

            <!-- 「カード用の浮き出る別窓」 -->
            <div class="deposit-selector-window" id="depositCardWindow">
              <p class="deposit-selector-title">カードを選択</p>
              <div class="deposit-selector-item" onclick="selectDepositOption('card', 'Starbucks Card ¥0', event)">
                <img src="../images/my-card-main.svg" alt="メイン" class="selector-card-img">
                <span>¥0</span>
              </div>
              <div class="deposit-selector-item" onclick="selectDepositOption('card', 'サブカード ¥0', event)">
                <img src="../images/my-card-sub.png" alt="サブ" class="selector-card-img">
                <span>¥0</span>
              </div>
            </div>
          </div> 

          ...省略(入金額、支払い方法)
        </div> <!-- .deposit-menu-list -->
   
        
</body>
</html>
