<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ticket-item">
            <div class="ticket-visual-card type-500">
              <div class="visual-main-gold">
                <div class="qr-tap-area" onclick="openQrModal()">
                 <div class="card-qr-box">
                   <img src="../images/QRコード.png" alt="QR" class="qr-ticket">
                 </div>
                </div>
                <div class="star-icon-area">
                  <img src="../images/star(5)-icon.svg" alt="星">
                </div>
                <div class="ticket-amount-rewards">
                  <div class="ticket-title-group">
                    <span class="brand-text-rewards">STARBUCKS®</span>
                    <span class="type-rewards">REWARDS</span>
                  </div>  
                  <span class="price">500</span>
                  <span class="ticket-type">eTicket</span>
                </div>
              </div>
              <div class="visual-side-text">
                <p class="eticket-text">ドリンク/<br>フード/<br>コーヒー豆/<br>ティー</p>
              </div>

              <div class="ticket-perforation">
                <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
            </div>

            <div class="ticket-explanation">
              <p class="desc-text">500円/505円(持ち帰り価格/店内価格)までお好きなドリンク・フード・コーヒー豆/ティー関連商品いずれか１点のお支払いにご利用いただけます。</p>
              <a href="#" class="detail-link">詳細はこちら</a>
              <p class="expiry-text"><strong>有効期限 2026年01月31日(土)</strong></p>
            </div>
          </div>


</body>
</html>
