<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- eGift 700チケット -->
          <div class="ticket-item">
            <div class="ticket-content-wrapper">
              <div class="ticket-visual-upper type-700">
                <!-- メインコンテンツエリア(深緑背景)-->  
                <div class="visual-main-area">
                  <!-- QRコード: タップ領域 -->
                  <div class="qr-tap-area-eticket" onclick="openQrModal()">
                    <img src="../images/QRコード.png" alt="QR" class="qr-eticket">
                  </div>
                  <!-- 中央情報グループ:カップ画像 -->
                  <div class="egift-info-center">
                    <span class="brand-name">STARBUCKS®</span>
                    <div class="cup-icon-area">
                      <img src="../images/cup-icon.svg" alt="カップ">
                    </div>  
                  </div>    
                </div>  
                <!-- 右側:金の帯エリア -->
                <div class="visual-side-band">
                  <div class="amount-box">
                    <span class="type">DRINK TICKET</span>
                    <span class="price-value">700</span>
                    <p class="ticket-name">eGift</p>  
                  </div>
                </div>
              </div><!-- .ticket-visual-upper.type-700 -->    

              <div class="ticket-perforation">
                <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
            
              <!-- 700チケットの内容 -->
              <div class="ticket-explanation">
                <p class="desc-text">お好きなドリンク１杯(税込700円まで)と交換できます。</p>
                <a href="#" class="detail-link">詳細はこちら</a>
                <p class="expiry-text"><strong>有効期限 2026年02月28日(土)</strong></p>
              </div>
            </div><!-- .ticket-content-wrapper -->
          </div><!-- .ticket-item (eGift700) -->

          <!-- eGift 300チケット -->
          <div class="ticket-item">
            <div class="ticket-content-wrapper">
              <div class="ticket-visual-upper type-300">
                <!-- メインコンテンツエリア(水色背景)-->  
                <div class="visual-main-area">
                  <!-- QRコード: タップ領域 -->
                  <div class="qr-tap-area-eticket" onclick="openQrModal()">
                    <img src="../images/QRコード.png" alt="QR" class="qr-eticket">
                  </div>
                   <!-- 中央情報グループ:フード画像 -->
                  <div class="egift-info-center">
                    <span class="brand-name">STARBUCKS®</span>
                    <div class="cup-icon-area">
                      <img src="../images/food-icon.svg" alt="フード">
                    </div>
                  </div>  
                </div>   
                <!-- 右側:ピンクの帯エリア -->
                <div class="visual-side-band">
                  <div class="amount-box">
                    <span class="type">FOOD TICKET</span>
                    <span class="price-value">300</span>
                    <p class="ticket-name">eGift</p>
                  </div>  
                </div> 
              </div><!-- .ticket-visual-upper.type-300 -->
</body>
</html>
