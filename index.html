<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
 <!-- 【QR拡大モーダル（第１モーダル）】 -->
  <div id="qrModal" class="qr-modal-overlay" onclick="closeQrModal(event)">
    <div class="qr-modal-content">
       <!-- モーダルのヘッダー --> 
       <div class="qr-modal-header">
         <button class="qr-close-btn" onclick="closeQrModal(event)">
          <span></span>
          <span></span>    
         </button>
       </div>

       <div class="qr-modal-zone">
          <img id="qrModalImg" src="" alt="支払いコード">     
           ...省略(コード番号の開閉トグル、コード番号表示など）
       </div>

       <div class="qr-modal-card-zone">
         <div class="qr-card-meta">...省略</div>   

         <!-- 別枠のカードをタップした時に、見た目と金額を切り替える場所 -->  
         <div class="qr-card-selector-window">  
          <div class="qr-selector-item" data-change-type="main-card" onclick="switchCard(event)">   
          ...省略
          </div> 
          <div class="qr-selector-item" data-change-type="sub-card" onclick="switchCard(event)">
          ...省略    
         </div><!-- .qr-card-selector-window -->   
       </div><!-- .qr-modal-card-zone -->

        <div class="qr-modal-card-graphic">
          <img id="qrModalCardImg" src="../images/starbucks-card-design.png" alt="スタバカードデザイン">
        </div> 

        <!-- フッター(他のページでも使いまわせるように、ここは共通のクラス名のまま) -->
        <div class="modal-footer-tabs">
        ...省略(eTicket >/ eGift > へのボタンが２つ)
        </div>
    </div><!-- .qr-modal-content -->
  </div><!-- #qrModal -->  

  <!--- 【入金ページ (第2モーダル) 】 ---> 
  <div id="depositModal" class="deposit-modal-overlay" onclick="closeDepositModal(event)">
    <div class="deposit-modal-content">  
        
     <!-- モーダルのヘッダー -->
      <div class="deposit-modal-header">
        <div class="drag-bar"></div>
        <button class="deposit-close-btn" onclick="closeDepositModalForce()">
          <span></span>
          <span></span>
        </button>
      </div>    

      <div class="deposit-modal-body">

        <!-- オートチャージ設定への入り口 -->  
        <div class="autocharge-banner">
          <div class="banner-text">...省略()</div>  
          <!-- タップしたら入金が閉じて、オートチャージ設定画面が開く関数 -->  
          <button class="setting-trigger-btn" onclick="openAutochargeModal(event)">設定する</button>
        </div>  

        <!-- B. 各種設定メニュー一覧(タップで小窓を開く仕掛けを onclick に仕込む) -->
        <div class="deposit-menu-list">
          <!-- 1. カード選択 -->
          <div class="deposit-menu-item" onclick="openMiniWindow('card', event)">
            <span class="menu-label">カード選択</span>
            <div class="menu-value-box">
              <!-- 現在選ばれているカードと金額を表示するエリア -->
              <span class="current-value">Sraebucks Card ¥00,000</span> <!-- ※画像と金額に変更 -->
              <span></span> <!-- ※下向き矢印 -->
              <span></span> 
            </div>
          </div> 

          <!-- 2. 入金額 -->
          <div class="deposit-menu-item" onclick="openMiniWindow('card', event)">
            <span class="menu-label">入金額</span>
            <div class="menu-value-box">
              <span class="current-value">¥1,000</span>
              <span></span> <!-- ※下向き矢印 -->
              <span></span> 
            </div>
          </div> 
          
          <!-- 3. 支払い方法 -->
          <div class="deposit-menu-item" onclick="openMiniWindow('card', event)">
            <span class="menu-label">支払い方法</span>
            <div class="menu-label-box">
              <!-- 初期設定は未登録状態 -->
              <span class="current-value">未登録</span>
              <span></span> <!-- ※下向き矢印 -->
              <span></span> 
            </div>
          </div>

        </div> <!-- .deposit-menu-list -->

        <!-- 一番下にある「次へ」ボタン -->
        <button  class="deposit-next-stop-btn" onclick="goToDepositConfirm(event)">次へ</button> 

        <!-- 最終確認 -->
        <div class="deposit-step-box step-confirm">
          <p class="confirm-intro-title">以下の内容で入金します</p>

          <!-- 自分で選択した内容が自動で反縁される箱 -->
          <div class="confirm-receipt-card">
            <div class="reciept-row">
              <span class="receipt-label">入金先カード</span>
              <span class="receipt-value" id="confirmvCard">--</span>
            </div>
            <div class="reciept-row">
              <span class="receipt-label">支払い方法</span>
              <span class="receipt-value" id="confirmMethot">--</span>
            </div>
          </div> 

          <!-- 「〇〇入金する」ボタン(JSで書き換わる) -->
          <button class="final-deposit-submit-btn" id="finalDepositBtn" onclick="executeDeposit(event)">¥1,000 入金する</button>
          
          <!-- キャンセルボタン(押したら選択画面に戻る) -->
          <button class="confirm-back-btn" onclick="backToDepositInput(event)">キャンセル</button>
        </div><!-- .deposit-step-box .step-confirm --> 

      </div><!-- .deposit-modal-body -->
    </div><!-- .deposit-modal-content -->

        <!-- 小窓のベース -->
        <div class="deposit-mini-window" id="depositMiniWindow">
          <div class="mini-window-content">

            <!-- 小窓のヘッダー（タイトルと閉じるボタン）-->
            <div class="mini-window-header">
              <p class="mini-window-title" id="miniWindowTitle">選択してください</p> 
              <button class="mini-close-btn" onclick="closeMiniWindow(event)">
                <span></span>
                <span></span> 
              </button>
            </div>  

            <!--  小窓の中身（ここにJSで選択肢を流し込む）　-->
            <div class="mini-window-body" id="miniWindowBody">
              <!-- ここは最初は空っぽでOK -->
            </div>  

          </div>
        </div>
  </div><!-- #depositModal -->


        

        
</body>
</html>
