<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>    
  <!-- カード切り替え別窓 -->
        <div class="card-selector-window">
          <p class="selector-title">カードを選択</p>
          
          <!-- メインカード -->
          <div class="selector-item" data-change-item="payment" onclick="switchCard(event)">
            <img src="../images/my-card.svg" alt="メインカード" class="selector-card-img">
            <div class="selector-card-info">
              <span class="selector-card-balance">¥0</span>
            </div>
          </div> 

          <!-- サブカード -->
           <div class="selector-item" data-change-item="payment" onclick="switchCard(event)">
            <img src="../images/my-card(red).png" alt="サブカード" class="selector-card-img">
            <div class="selector-card-info">
              <span class="selector-card-balance">¥0</span>
            </div>
          </div> 
          
          <!-- 必要に応じて追加 -->
        </div>   
      </div>

</body>
</html>
