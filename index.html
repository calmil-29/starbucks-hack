<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

 <!-- オートチャージ設定画面（第3モーダル：画面の80%ほどまでせり上がる） -->
  <div id="autochargeModal" class="autocharge-modal-overlay" onclick="closeAutochargeModal(event)">
    <div class="autocharge-modal-content">
      
      <!-- ヘッダー -->
      <div class="autocharge-modal-header">
        <div class="drag-bar"></div>
        <button class="autocharge-close-btn" onclick="closeAutochargeModalForce()">
          <span></span>
          <span></span>
        </button>
      </div>

      <div class="autocharge-modal-body">
        
        <p class="autocharge-title">オートチャージ設定</p>
        <p class="autocharge-summary" id="autoSummaryText">¥2,000（入金条件：残高が¥1,000未満）</p>
        
        <!-- オートチャージ設定のメニュー一覧（第２モーダルのCSSクラスをそのまま流用） -->
       <div class="autocharge-menu-list">

       ...省略(オートチャージ用に入金条件をプラスし、あとは第２モーダルと同様のカード選択、入金額、支払い方法とそれぞれの別窓デザイン)
       
        </div><!-- deposit-menu-list" -->

        <!-- 「次へ」ボタン -->
        <button class="deposit-next-stop-btn autocharge-next-btn" onclick="goToAutochargeConfirm(event)">次へ</button> 

    
      </div><!-- .autocharge-modal-body -->

       <!-- 一番下にあるボタンの切り替え（最初は保存、確認時は完了など） ⚠️？これどこに置けばいい？ -->
        <button class="autocharge-save-btn" onclick="executeAutochargeSave(event)">保存</button>
    </div><!-- .autocharge-modal-content -->
  </div><!-- #autochargeModal .autocharge-modal-overlay-->



</body>
</html>
