<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
<div id="qrModal" class="modal-overlay" onclick="closeQrModal(event)">

    <div class="modal-content">

      <div class="modal-header">
        <span class="close-btn" onclick="closeQrModal(event)">x</span>
      </div>

      <div class="modal-qr-zone">
        <img id="modalQrImg" src="" alt="支払いコード">
        <p class="code-toggle">コード番号を表示 v</p>
        <p class="code-number">1234 5678 9101 1121<br>3141 5161 7181 920</p>
      </div>
      
      <div class="modal-card-zone">
        <div class="card-meta">
          <span class="card-name">Starbucks Card</span>

          <div class="balance-wrapper" onclick="toggleCardSelector(event)"> 
            <span class="card-balance">¥00,000</span>
            <span class="arrow-v"> v </span>
          </div>
        </div>
        <button class="deposit-btn" onclick="openDepositModal(event)">入金</button>

        <!-- カード切り替え別窓 -->
        <div class="card-selector-window">
          <p class="selector-title">カードを選択</p>
          
          <!-- メインカード -->
          <div class="selector-item" data-change-type="main-card" onclick="switchCard(event)">
            <img src="../images/my-card-main.svg" alt="メインカード" class="selector-card-img">
            <div class="selector-card-info">
              <span class="selector-card-balance">¥0</span>
            </div>
          </div> 

          <!-- サブカード -->
           <div class="selector-item" data-change-type="sub-card" onclick="switchCard(event)">
            <img src="../images/my-card-sub.png" alt="サブカード" class="selector-card-img">
            <div class="selector-card-info">
              <span class="selector-card-balance">¥0</span>
            </div>
          </div> 
          
          <!-- 必要に応じて追加 -->
        </div>   
      </div>

      <div class="modal-card-graphic">
        <img id="modalCardImg" src="../images/starbucks-card-design.png" alt="スタバカードデザイン">
      </div>

      <div class="modal-footer-tabs">
        <div class="tab-item"><span>0</span> eGift ＞</div>
        <div class="tab-item"><span>3</span>eTicket ＞</div>
      </div>

    </div><!-- .modal-content -->
  </div><!-- #qrModal -->



</body>
</html>
