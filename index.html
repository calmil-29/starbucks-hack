<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="card-hero-section">
  <div class="card-flip-container" id="cardFlip">
    <div class="card-flip-inner">
      
      <div class="card-front">
        <div class="card-main-visual">
          <div class="qr-tap-area" onclick="openQrModal()">
            <div class="card-qr-box">
              <img src="../images/QRコード.png" alt="QR" class="qr-img">
            </div>
          </div>
          <div class="card-info-side">
            <img src="../images/starbucks-logo.png" alt="Logo" class="mini-logo">
            <div class="balance-display">
              <p class="card-label">Starbucks Card</p>
              <p class="card-price"><span class="unit">¥</span>00,000</p>
            </div>
            <button class="btn-etiket-trigger" onclick="flipCard(event)">
              <div class="count-box">
                <span class="count">3</span>
              </div> 
              <span class="eticket-label">eTicket</span>
              <span class="eticket-badge"></span>
            </button>
          </div>
        </div> <div class="star-progress-overlay">
          <div class="rewards-label">
            <p>STARBUCKS® REWARDS</p>
          </div>  
          <div class="current-stars-group">
            <div class="current-reward">
              <span class="big-number">160</span>.5 <img src="../images/Star-icon.svg" alt="★">
            </div>
            <p class="member-status">Green会員</p>
          </div>
          <div class="progress-bar-wrapper">
            <div class="progress-bar-track">
              <div id="js-progressbar" class="progress-bar-fill" style=""></div>
              <div class="track-dots">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
              </div>
            </div>
            <div class="progress-steps">
              <span>25</span><span>90</span><span>130</span><span>190</span><span>400</span>
            </div>
          </div> </div> </div> <div class="card-back">
        <div class="ticket-header">
           <span class="ticket-title">Star Ticket</span>
           <button class="btn-back-to-front" onclick="flipCard(event)">BACK</button>
        </div>
        </div> </div> </div> <div class="card-action-list">
    </div>  
  
  </section>



</body>
</html>
