<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <!--- 【入金ページ (第2モーダル) 】 ---> 
  <div id="depositModal" class="deposit-modal-overlay" onclick="closeDepositModal(event)">
    <div class="deposit-modal-content">  
        
      <!-- モーダルのヘッダー -->
      <div class="deposit-modal-header">
        <div class="drag-bar"></div>
        <button class="deposit-close-btn" onclick="closeDepositModalForce()">
          <span></span>
          <span></span>
        </button>
      </div>    

      <div class="deposit-modal-body">

        <!-- オートチャージ設定への入り口 -->  
        <div class="autocharge-banner">
          <div class="banner-text">
            <p class="banner-title">オートチャージ</p>
            <p class="banner-sub">オートチャージ ¥2,000 (残高が¥1,000未満)</p>
          </div>  
          <button class="setting-trigger-btn" onclick="openAutochargeModal(event)">設定する</button>
        </div>  

        <!-- B. 各種設定メニュー一覧 -->
        <div class="deposit-menu-list">
          
          <!-- 1. カード選択 -->
          <div class="deposit-menu-item">
            <div class="menu-clickable-area" onclick="toggleDepositWindow('card', event)">
              <span class="menu-label">カード選択</span>
              <div class="menu-value-box">
                <span class="current-value">Starbucks Card ¥00,000</span>
                <span class="arrow-balance"></span> 
              </div>
            </div>

            <!-- 💡 第1モーダルと全く同じ書き方の「浮き出る別窓」 -->
            <div class="deposit-selector-window" id="depositCardWindow">
              <p class="deposit-selector-title">カードを選択</p>
              <div class="deposit-selector-item" onclick="selectDepositOption('card', 'Starbucks Card ¥5,780', event)">
                <img src="../images/my-card-main.svg" alt="メイン" class="selector-card-img">
                <span>¥5,780</span>
              </div>
              <div class="deposit-selector-item" onclick="selectDepositOption('card', 'サブカード ¥0', event)">
                <img src="../images/my-card-sub.png" alt="サブ" class="selector-card-img">
                <span>¥0</span>
              </div>
            </div>
          </div> 

          <!-- 2. 入金額 -->
          <div class="deposit-menu-item">
            <div class="menu-clickable-area" onclick="toggleDepositWindow('amount', event)">
              <span class="menu-label">入金額</span>
              <div class="menu-value-box">
                <span class="current-value">¥1,000</span>
                <span class="arrow-balance"></span> 
              </div>
            </div>

            <!-- 💡 全く同じ書き方の「金額用の別窓」 -->
            <div class="deposit-selector-window" id="depositAmountWindow">
              <div class="deposit-selector-item" onclick="selectDepositOption('amount', '¥1,000', event)">¥1,000</div>
              <div class="deposit-selector-item" onclick="selectDepositOption('amount', '¥3,000', event)">¥3,000</div>
              <div class="deposit-selector-item" onclick="selectDepositOption('amount', '¥5,000', event)">¥5,000</div>
              <div class="deposit-selector-item" onclick="selectDepositOption('amount', '¥10,000', event)">¥10,000</div>
            </div>
          </div> 
          
          <!-- 3. 支払い方法 -->
          <div class="deposit-menu-item">
            <div class="menu-clickable-area" onclick="toggleDepositWindow('method', event)">
              <span class="menu-label">支払い方法</span>
              <div class="menu-value-box">
                <span class="current-value">未登録</span>
                <span class="arrow-balance"></span> 
              </div>
            </div>

            <!-- 💡 全く同じ書き方の「支払い方法用の別窓」 -->
            <div class="deposit-selector-window" id="depositMethodWindow">
              <div class="deposit-selector-item" onclick="selectDepositOption('method', 'Apple Pay', event)">Apple Pay</div>
              <div class="deposit-selector-item" onclick="selectDepositOption('method', 'PayPay', event)">PayPay</div>
            </div>
          </div>

        </div> <!-- .deposit-menu-list -->

        <!-- 一番下にある「次へ」ボタン -->
        <button class="deposit-next-stop-btn" onclick="goToDepositConfirm(event)">次へ</button> 

        <!-- 最終確認（省略） -->

      </div><!-- .deposit-modal-body -->
    </div><!-- .deposit-modal-content -->
  </div><!-- #depositModal -->

        
</body>
</html>
