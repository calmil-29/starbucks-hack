<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
#depositModal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5); /* 薄い背景 */

    /* 第1モーダル(9999)よりも大きい数値を指定、さらに手間に重ねる */
    z-index: 10000;

    /* 初期状態は非表示(第1モーダルと同じ仕組み) */ /* ⚠️ここがあるとそもそも第1モーダルが開かない */
    opacity: 0;
    visibility: visible;
}
</body>
</html>
