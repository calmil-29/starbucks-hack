<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- カード切り替え別窓 -->
        <div class="qr-card-selector-window">
          <p class="qr-selector-title">カードを選択</p>
          
          <!-- メインカード -->
          <div class="qr-selector-item" data-change-type="main-card" onclick="switchCard(event)">
            <img src="../images/my-card-main.svg" alt="メインカード" class="qr-selector-card-img">
            <div class="qr-selector-card-info">
              <span class="qr-selector-card-balance">¥0</span>
            </div>
          </div> 

          <!-- サブカード -->
          <div class="qr-selector-item" data-change-type="sub-card" onclick="switchCard(event)">
            <img src="../images/my-card-sub.png" alt="サブカード" class="qr-selector-card-img">
            <div class="qr-selector-card-info">
              <span class="qr-selector-card-balance">¥0</span>
            </div>
          </div> 
          
          <!-- 必要に応じて追加 -->

        </div><!-- .qr-card-selector-window -->   

        
</body>
</html>
