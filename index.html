<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ②カード裏面(eTicket / eGift eTicket) -->
      <div class="card-back">
        <div class="carousel-dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>

        <div class="ticket-carousel-inner">
          
          <!-- eTicket 500チケット -->
          <div class="ticket-item">
            <div class="ticket-content-wrapper">
              <div class="ticket-visual-upper type-500">
                <!-- 500 メインコンテンツエリア(暗緑色背景) -->
                <div class="visual-main-area">
                  <!-- 500 QRコード:タップ領域 -->
                  <div class="qr-tap-area-eticket" onclick="openQrModal()">
                    <img src="../images/QRコード.png" alt="QR" class="qr-eticket">
                  </div>
                  <!-- 500 中央情報グループ:タイトル / 500 / eTicket -->
                  <div class="eticket-info-center">
                    <div class="brand-title-group">
                      <span class="brand-name">STARBUCKS®</span>
                      <span class="brand-name-sub">REWARDS</span>
                    </div>
                    <div class="amount-box">
                      <span class="price-value">500</span>
                      <span class="ticket-name">eTicket</span>
                    </div>
                  </div>
                </div><!-- .visual-main-area(メインコンテンツエリア) -->
                <!-- 500 右側: 暗緑の帯エリア -->
                <div class="visual-side-band">
                  <div class="star-layer">
                    <img src="../images/star-all-in-one3.svg" alt="星の群れ" class="star-svg">
                  </div>
                  <p class="side-detail-text">ドリンク/<br>フード/<br>コーヒー豆/<br>ティー</p>
                </div>  
              </div><!-- .ticket-visual-upper.type-500 -->

              <div class="ticket-perforation">
                <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
            
              <!-- 500チケットの内容 -->
              <div class="ticket-explanation">
                <p class="desc-text">500円/505円(持ち帰り価格/店内価格)までお好きなドリンク・フード・コーヒー豆/ティー関連商品いずれか１点のお支払いにご利用いただけます。</p>
                <a href="#" class="detail-link">詳細はこちら</a>
                <p class="expiry-text"><strong>有効期限 2026年01月31日(土)</strong></p>
              </div>

              <button class="btn-back-to-front" onclick="flipCard(event)">BACK</button>

            </div><!-- .ticket-content-wrapper -->  
          </div><!-- .ticket-item (REWARDS 500チケット) -->
          .......
          <!-- eGift 700チケット -->
          ....
           </div><!-- .ticket-content-wrapper -->
          </div><!-- .ticket-item (eGift700) -->
  
          <!-- eGift 300チケット -->
          ....
           </div><!-- .ticket-content-wrapper -->
          </div><!-- ticket-item (eGift300) -->  

          </div><!-- .ticket-carousel-innner -->
  

</body>
</html>
