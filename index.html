<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Starbucks Huck Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ①カード画面(Hero Area) -->
  <section class="card-hero-section">
    <div class="card-flip-container" id="cardFlip">
      <div class="card-flip-inner">
      
        <div class="card-front">
          <div class="card-main-visual">
            <div class="qr-tap-area" onclick="openQrModal()">
              <div class="card-qr-box">
                <img src="../images/QRコード.png" alt="QR" class="qr-img">
              </div>
            </div>

            <div class="card-info-side">
              <img src="../images/starbucks-logo.png" alt="Logo" class="mini-logo">
              <div class="balance-display">
                <p class="card-label">Starbucks Card</p>
                <p class="card-price"><span class="unit">¥ </span>00,000</p>
              </div>
              <button class="btn-etiket-trigger" onclick="flipCard(event)">
                <div class="count-box">
                  <span class="count">3</span>
                </div> 

                <span class="eticket-label">eTicket</span>
                <span class="eticket-badge"></span>
              </button>
            </div><!-- card-info-side -->
          </div><!-- card-main-visual　-->

          <div class="star-progress-overlay">
            <div class="rewards-label">
              <p>STARBUCKS® REWARDS</p>
            </div>  

            <div class="current-stars-group">
              <div class="current-reward">
                <span class="big-number">160</span>.5 <img src="../images/Star-icon.svg" alt="★">
              </div>
              <p class="member-status">Green会員</p>
            </div>

            <div class="progress-bar-wrapper">
              <div class="progress-bar-track">
                <div id="js-progressbar"  class="progress-bar-fill" style=""></div>

                <div class="track-dots">
                  <span class="dot"></span>
                  <span class="dot"></span>
                  <span class="dot"></span>
                  <span class="dot"></span>
                  <span class="dot"></span>
                </div>
              </div>  
            </div>

              <div class="progress-steps">
                <span>25</span><span>90</span><span>130</span><span>190</span><span>400</span>
              </div>
        </div><!-- card-front -->
      </div><!-- card-flip-inner -->
    </div><!-- card-flip-container -->

    <div class="card-back">
      <div class="ticket-header">
        <span class="ticket-title">Star Ticket</span>
          <button class="btn-back-to-front" onclick="flipCard(event)">BACK</button>
      </div>
    </div><!-- card-back -->


  <div class="card-action-list">
    <a href="#" class="btn-action-single" aria-label="入金">
     <button class="btn-charge">入金</button>
    </a> 

   <div class="btn-action-group">
    <a href="#" class="btn-reward-main" aria-label="スターリワードに交換する">
     <button class="btn-reward">スターリワードに交換</button>
    </a> 
    <a href="#" class="btn-reward-sub" aria-label="スターリワードをもっと見る">
     <button class="btn-reward-more">もっと見る</button>
    </a>
    </div>
  </div>  
  
  <!-- モダール画面用 -->
  <div id="qrModal" class="qr-modal">
    <div class="qr-modal-content">
      <div class="modal-handle"></div> <div class="modal-qr-big">
        <img src="../images/QRコード.png" alt="Big QR">
      </div>
      <details class="code-number"><!--　details summary で折りたためるか確認 -->
        <summary class="code-number">0000 0000 0000 0000</summary>
      </details>  

      <ul class="modal-menu">
        <li>カード管理 (入金・切り替え)</li>
        <li>eGift <span>&gt;</span></li>
        <li onclick="closeQrModal()">閉じる</li>
      </ul>
    </div>
  </div>
</section>

</body>
</html>
